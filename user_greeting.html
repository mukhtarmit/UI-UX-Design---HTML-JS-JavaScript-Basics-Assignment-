<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Greeting</title>
</head>
<body>

    <script>
        var username = prompt("Please enter your name:");

        document.write("<h1>Hello " + username + "!</h1>");

        alert("Hello " + username + "!");
    </script>

</body>
</html>
