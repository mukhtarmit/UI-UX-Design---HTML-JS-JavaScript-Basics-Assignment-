<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Changer</title>
</head>
<body>

    <h1>Click the button to change the background color</h1>
    <button onclick="changeColor()">Change Color</button>

    <script>
        function changeColor() {
            document.body.style.backgroundColor = "blue";
        }
    </script>

</body>
</html>
