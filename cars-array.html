<!DOCTYPE html>
<html>
<head>
    <title>Cars Array</title>
</head>
<body>

<script>
    // Define the array
    let cars = ["toyota", "honda", "mazda", "mitsubishi", "tesla", "lexus"];

    // Log the first item
    console.log("First item:", cars[0]);

    // Log the last item using the length property
    console.log("Last item:", cars[cars.length - 1]);

    // Add mercedes-benz to the array
    cars.push("mercedes-benz");

    // Log the updated array
    console.log("Updated array:", cars);

    // Loop through all items and log them
    for (let i = 0; i < cars.length; i++) {
        console.log(cars[i]);
    }
</script>

</body>
</html>
